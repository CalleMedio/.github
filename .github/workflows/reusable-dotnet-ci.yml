name: Reusable .NET CI
on:
  workflow_call:
    inputs:
      dotnet-version: { type: string, default: '10.0.x' }
      solution:       { type: string, default: '' }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: ${{ inputs.dotnet-version }} }
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
      - run: dotnet restore ${{ inputs.solution }}
      - run: dotnet build ${{ inputs.solution }} --no-restore -c Release
      - run: dotnet test  ${{ inputs.solution }} --no-build -c Release
